# Site Platform Backend - Production
# Build from monorepo root. Load .env from infra/deployment/production/siteplatform.env

services:
  siteplatform:
    build:
      context: ../../..
      dockerfile: infra/docker/siteplatform/Dockerfile
    image: finverse/siteplatform:production
    container_name: siteplatform-production
    restart: unless-stopped
    network_mode: host
    env_file:
      - siteplatform.env
    environment:
      - NODE_ENV=production
