# LMS Backend - Staging
# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-go/master/schema/compose-spec.json
version: '3.8'
services:
  lms:
    build:
      context: ../../../
      dockerfile: infra/docker/lms/Dockerfile
    image: finverse/lms:staging
    container_name: lms-staging
    restart: unless-stopped
    network_mode: host
    env_file:
      - lms.env
    environment:
      - NODE_ENV=staging
