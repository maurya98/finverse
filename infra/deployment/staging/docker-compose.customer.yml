# Customer Backend - Staging
# Build from monorepo root. Use --env-file infra/deployment/staging/customer.env
# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-go/master/schema/compose-spec.json
version: '3.8'
services:
  customer:
    build:
      context: ../../..
      dockerfile: infra/docker/customer/Dockerfile
    image: finverse/customer:staging
    container_name: customer-staging
    restart: unless-stopped
    network_mode: host
    env_file:
      - customer.env
    environment:
      - NODE_ENV=staging
