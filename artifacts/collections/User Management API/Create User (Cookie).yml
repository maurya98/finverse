info:
  name: Create User (Cookie)
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:3002/api/users
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: authToken=your_auth_token_here
  body:
    type: json
    data: |-
      {
        "email": "newuser@example.com",
        "password": "SecurePass123!",
        "name": "New User"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
