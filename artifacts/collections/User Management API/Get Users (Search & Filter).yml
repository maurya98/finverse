info:
  name: Get Users (Search & Filter)
  type: http
  seq: 3

http:
  method: GET
  url: http://localhost:3002/api/users?page=1&limit=10&search=john&role=USER&isActive=true&sortBy=createdAt&sortOrder=desc
  headers:
    - name: Authorization
      value: Bearer your_auth_token_here
  params:
    - name: page
      value: "1"
      type: query
    - name: limit
      value: "10"
      type: query
    - name: search
      value: john
      type: query
    - name: role
      value: USER
      type: query
    - name: isActive
      value: "true"
      type: query
    - name: sortBy
      value: createdAt
      type: query
    - name: sortOrder
      value: desc
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
