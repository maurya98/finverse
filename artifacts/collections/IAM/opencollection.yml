opencollection: 1.0.0

info:
  name: IAM
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  headers:
    - name: Origin
      value: http://localhost:3008
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
